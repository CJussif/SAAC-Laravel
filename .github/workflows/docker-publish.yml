name: Publicar imágenes Docker (ghcr.io)

# Construye y publica las imágenes de producción en GitHub Container Registry.
#   - ghcr.io/cjussif/saac-laravel-app  (target "app": PHP-FPM + Laravel)
#   - ghcr.io/cjussif/saac-laravel-web  (target "web": nginx + estáticos)
#
# Se dispara al hacer push a main, al crear un tag vX.Y.Z, o manualmente.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: app
            suffix: app
          - target: web
            suffix: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login en ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build y push (${{ matrix.target }})
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
