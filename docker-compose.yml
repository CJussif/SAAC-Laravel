# =============================================================
# SAAC-Laravel — despliegue de producción
#
#   Prueba LOCAL:
#     docker compose --env-file .env.production up -d
#     -> http://localhost:8080
#
#   VPS (con túnel Cloudflare):
#     ./scripts/deploy.sh
#
# IMPORTANTE: siempre pasa --env-file .env.production (o usa deploy.sh).
# =============================================================
name: saac

services:
  # ---- PHP-FPM (Laravel) ----
  app:
    build:
      context: .
      target: app
    image: saac-app
    env_file: [.env.production]
    volumes:
      - storage_data:/var/www/html/storage
      - sqlite_data:/var/www/html/database
    restart: unless-stopped

  # ---- nginx (estáticos + proxy a app) ----
  web:
    build:
      context: .
      target: web
    image: saac-web
    depends_on: [app]
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

  # ---- worker de colas (notificaciones EvidenciaEvaluada) ----
  queue:
    image: saac-app
    env_file: [.env.production]
    command: php artisan queue:work --tries=3 --max-time=3600 --sleep=2
    volumes:
      - storage_data:/var/www/html/storage
      - sqlite_data:/var/www/html/database
    depends_on: [app]
    restart: unless-stopped

  # ---- Cloudflare Tunnel (solo con: --profile tunnel) ----
  # Crea el túnel en https://one.dash.cloudflare.com (Zero Trust > Networks > Tunnels),
  # apunta tescha.tlapala.com -> Service HTTP -> URL  web:80,
  # y pon el token en CLOUDFLARE_TUNNEL_TOKEN de .env.production.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on: [web]
    restart: unless-stopped

volumes:
  storage_data:
  sqlite_data:
